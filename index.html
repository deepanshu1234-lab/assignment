<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikachu UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main>

    <div class="content">

      <img 
        class="logo" 
        src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" 
        alt="Pokemon Logo"
      />

      <p class="poke1">POKEMON GEN I</p>

      <p class="pikachu">Pikachu</p>

      <p class="description">
        Pikachu is an Electric-type Pokémon introduced <br>
        in Generation I. Pikachu are small, chubby, <br>
        and incredibly cute mouse-like Pokémon. <br>
        They are almost completely covered by <br>
        yellow fur.
      </p>

      <p class="dash">— 01 / 08</p>

      <div class="pokeball"></div>

    </div>

    <div class="nav">

      <div class="bar">
        <div class="stick"></div>
        <div class="stick"></div>
        <div class="stick"></div>
      </div>

      <div class="dotdot">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

    </div>

    <img 
      class="pikachuimg" 
      src="https://www.pngmart.com/files/22/Pikachu-Pokemon-PNG-HD.png" 
      alt="Pikachu"
    />

  </main>

</body>
</html>
