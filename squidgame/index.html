<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squid Game Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="page">

    <!-- Big faded background text -->
    <h1 class="bg-game">GAME</h1>
    <h1 class="bg-squid">SQUID</h1>

    <!-- Navbar -->
    <nav class="navbar">

      <div class="logo">
        <img src="./logo.png" alt="Squid Game Logo">
      </div>

      <div class="nav-links">
        <a href="#">About</a>
        <a href="#" class="active">Watch now</a>
        <a href="#">Actors</a>
        <a href="#">Contact</a>
      </div>

      <div class="menu">
        <img src="./bars-solid-full.svg" alt="Menu Icon">
      </div>

    </nav>

    <!-- Hero Section -->
    <section class="hero">

      <!-- Left Content -->
      <div class="left-content">

        <div class="yellow-star"></div>
        <div class="blue-star"></div>

        <img class="main-logo" src="./logo.png" alt="Squid Game Logo">

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang <br>
          Season 1: 9 Episodes
        </p>

        <div class="buttons">

          <button class="play-btn">
            <img src="./play-solid-full.svg" alt="Play Icon">
            Play Now
          </button>

          <button class="trailer-btn">
            Watch Trailer
          </button>

        </div>

      </div>

      <!-- Scroll Text -->
      <div class="scroll-box">
        <span>SCROLL</span>
        <div class="scroll-line"></div>
      </div>

      <!-- Right Image -->
      <div class="right-image">
        <img src="./soliderimage.png" alt="Pink Soldier">
      </div>

      <!-- Social Icons -->
      <div class="social-icons">
        <img src="./instagram-brands-solid-full.svg" alt="Instagram">
        <img src="./facebook-f-brands-solid-full.svg" alt="Facebook">
      </div>

    </section>

    <!-- Cards Section -->
    <section class="cards-section">

      <div class="card">
        <img src="./card1.jpg" alt="Card 1">
        <button class="card-play">
          <img src="./play-solid-full.svg" alt="Play">
        </button>
      </div>

      <div class="card">
        <img src="./card2.jpg" alt="Card 2">
        <button class="card-play">
          <img src="./play-solid-full.svg" alt="Play">
        </button>
      </div>

      <div class="card">
        <img src="./card3.jpg" alt="Card 3">
        <button class="card-play">
          <img src="./play-solid-full.svg" alt="Play">
        </button>
      </div>

    </section>

  </main>

</body>
</html>
